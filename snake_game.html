<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
            font-size: 32px;
        }

        #gameCanvas {
            border: 3px solid #4CAF50;
            display: block;
            background: #282828;
            margin: 20px auto;
            border-radius: 5px;
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 20px;
        }

        .info-box {
            background: #2d2d2d;
            padding: 15px 30px;
            border-radius: 5px;
            border-left: 4px solid #4CAF50;
        }

        .info-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
        }

        .info-value {
            color: #4CAF50;
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        #gameOver {
            color: #FFC107;
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            display: none;
        }

        .instructions {
            color: #999;
            margin-top: 20px;
            line-height: 1.6;
            font-size: 14px;
        }

        .instructions p {
            margin: 10px 0;
        }

        .key {
            background: #4CAF50;
            color: #1a1a1a;
            padding: 5px 10px;
            border-radius: 3px;
            display: inline-block;
            font-weight: bold;
            margin: 0 2px;
        }

        button {
            background: #4CAF50;
            color: #1a1a1a;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background: #66BB6A;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Google Snake</h1>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="gameOver">GAME OVER! Press SPACE or click Restart</div>
        
        <div class="info">
            <div class="info-box">
                <div class="info-label">Score</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">High Score</div>
                <div class="info-value" id="highScore">0</div>
            </div>
        </div>

        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>
                <span class="key">↑</span>
                <span class="key">↓</span>
                <span class="key">←</span>
                <span class="key">→</span>
                or
                <span class="key">W</span>
                <span class="key">A</span>
                <span class="key">S</span>
                <span class="key">D</span>
            </p>
            <p>Press <span class="key">SPACE</span> to restart after game over</p>
        </div>

        <button onclick="location.reload()">Restart Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const GRID_SIZE = 20;
        const GRID_WIDTH = canvas.width / GRID_SIZE;
        const GRID_HEIGHT = canvas.height / GRID_SIZE;
        
        // Colors
        const BG_COLOR = '#282828';
        const SNAKE_COLOR = '#4CAF50';
        const SNAKE_HEAD_COLOR = '#90EE90';
        const FOOD_COLOR = '#F44336';
        
        // Game state
        let snake = [
            { x: Math.floor(GRID_WIDTH / 2), y: Math.floor(GRID_HEIGHT / 2) },
            { x: Math.floor(GRID_WIDTH / 2) - 1, y: Math.floor(GRID_HEIGHT / 2) },
            { x: Math.floor(GRID_WIDTH / 2) - 2, y: Math.floor(GRID_HEIGHT / 2) }
        ];
        
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = spawnFood();
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameOver = false;
        let gameRunning = true;
        
        // Key tracking
        const keysPressed = {};
        
        // Event listeners
        document.addEventListener('keydown', (e) => {
            keysPressed[e.key.toLowerCase()] = true;
            handleKeyPress(e);
        });
        
        document.addEventListener('keyup', (e) => {
            keysPressed[e.key.toLowerCase()] = false;
        });
        
        function handleKeyPress(e) {
            const key = e.key.toLowerCase();
            
            if (key === ' ') {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                }
                return;
            }
            
            // Arrow keys and WASD
            if (key === 'arrowup' || key === 'w') {
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            } else if (key === 'arrowdown' || key === 's') {
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            } else if (key === 'arrowleft' || key === 'a') {
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            } else if (key === 'arrowright' || key === 'd') {
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            }
        }
        
        function spawnFood() {
            let newFood;
            let foodOnSnake = true;
            
            while (foodOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * GRID_WIDTH),
                    y: Math.floor(Math.random() * GRID_HEIGHT)
                };
                
                foodOnSnake = snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }
            
            return newFood;
        }
        
        function update() {
            if (gameOver || !gameRunning) return;
            
            direction = nextDirection;
            
            // Calculate new head
            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };
            
            // Check wall collision
            if (newHead.x < 0 || newHead.x >= GRID_WIDTH || 
                newHead.y < 0 || newHead.y >= GRID_HEIGHT) {
                endGame();
                return;
            }
            
            // Check self collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                endGame();
                return;
            }
            
            // Add new head
            snake.unshift(newHead);
            
            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                updateScore();
                food = spawnFood();
            } else {
                snake.pop();
            }
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? SNAKE_HEAD_COLOR : SNAKE_COLOR;
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
            });
            
            // Draw food
            ctx.fillStyle = FOOD_COLOR;
            ctx.fillRect(
                food.x * GRID_SIZE + 1,
                food.y * GRID_SIZE + 1,
                GRID_SIZE - 2,
                GRID_SIZE - 2
            );
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }
        
        function endGame() {
            gameOver = true;
            gameRunning = false;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function resetGame() {
            snake = [
                { x: Math.floor(GRID_WIDTH / 2), y: Math.floor(GRID_HEIGHT / 2) },
                { x: Math.floor(GRID_WIDTH / 2) - 1, y: Math.floor(GRID_HEIGHT / 2) },
                { x: Math.floor(GRID_WIDTH / 2) - 2, y: Math.floor(GRID_HEIGHT / 2) }
            ];
            
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            food = spawnFood();
            score = 0;
            gameOver = false;
            gameRunning = true;
            
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('score').textContent = '0';
            updateScore();
        }
        
        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, 100); // 100ms = ~10 FPS
        }
        
        // Initialize
        updateScore();
        gameLoop();
    </script>
</body>
</html>
